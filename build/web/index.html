<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Battle City - AI Combat Evolved</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=JetBrains+Mono&display=swap');

        body {
            background-color: #0b0b10;
            background-image: linear-gradient(rgba(0, 255, 200, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 200, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            color: #e0e0f0; margin: 0; padding: 0; overflow: hidden; font-family: 'Outfit', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        #status-overlay {
            position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 100;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0b0b10 100%);
        }

        .main-container {
            display: flex; width: 900px; height: 520px; background: rgba(20, 20, 30, 0.95);
            border: 1px solid rgba(0, 255, 200, 0.2); box-shadow: 0 0 60px rgba(0,0,0,0.9);
            border-radius: 15px; overflow: hidden; position: relative; backdrop-filter: blur(10px);
        }

        .main-container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 15px; padding: 2px;
            background: conic-gradient(from 0deg, transparent 80%, #00ffc8 90%, transparent 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude; animation: border-slide 4s linear infinite; pointer-events: none;
        }

        @keyframes border-slide { 0% { background: conic-gradient(from 0deg, transparent 80%, #00ffc8 90%, transparent 100%); } 100% { background: conic-gradient(from 360deg, transparent 80%, #00ffc8 90%, transparent 100%); } }

        .pane { flex: 1; padding: 40px; display: flex; flex-direction: column; z-index: 1; }
        .loading-pane { flex: 1.2; justify-content: center; align-items: center; background: rgba(10, 10, 15, 0.6); border-right: 1px solid rgba(0, 255, 200, 0.1); }

        .logo { font-size: 42px; font-weight: 700; letter-spacing: 8px; color: #ffffff; text-shadow: 0 0 30px rgba(0, 255, 200, 0.5); margin-bottom: 5px; }
        .subtitle { font-size: 11px; color: #00ffc8; letter-spacing: 4px; margin-bottom: 60px; text-transform: uppercase; opacity: 0.8; }

        #progress-container { width: 100%; height: 4px; background-color: #1a1a2e; border-radius: 2px; overflow: hidden; margin-bottom: 20px; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #0099ff, #00ffc8); box-shadow: 0 0 15px #00ffc8; transition: width 0.3s ease; }
        #status-label { font-size: 10px; color: #606080; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; }

        #start-btn {
            padding: 20px 60px; background: #00ffc8; border: none; color: #0b0b10; font-family: 'Outfit', sans-serif;
            font-weight: 700; font-size: 18px; cursor: pointer; letter-spacing: 3px; border-radius: 8px;
            display: none; text-transform: uppercase; box-shadow: 0 0 30px rgba(0, 255, 200, 0.4); animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        #canvas { display: none; border-radius: 8px; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        h3 { color: #00ffc8; font-size: 16px; border-bottom: 1px solid rgba(0, 255, 200, 0.2); padding-bottom: 10px; margin-bottom: 25px; }
        .instruction-item { margin-bottom: 30px; }
        .key-label { color: #fff; font-weight: 700; font-size: 13px; display: block; margin-bottom: 5px; }
        .key-desc { color: #808095; font-size: 12px; line-height: 1.5; }
    </style>
</head>
<body>
    <div id="status-overlay">
        <div class="main-container">
            <div class="pane loading-pane">
                <div class="logo">BATTLE CITY</div>
                <div class="subtitle">AI Combat Evolved</div>
                <div id="progress-container"><div id="progress-bar"></div></div>
                <div id="status-label">Initializing Core...</div>
                <button id="start-btn" onclick="startGame()">Engage Combat</button>
            </div>
            <div class="pane briefing-pane">
                <h3>Tactical Briefing</h3>
                <div class="instruction-item"><span class="key-label">DESKTOP</span><span class="key-desc">WASD: Move | SPACE: Fire</span></div>
                <div class="instruction-item"><span class="key-label">MOBILE</span><span class="key-desc">Touch Controls activate on start.</span></div>
                <div class="instruction-item"><span class="key-label">MISSION</span><span class="key-desc">Eliminate hostiles. Defend the Core.</span></div>
            </div>
        </div>
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script type="text/javascript">
        const progressBar = document.getElementById('progress-bar');
        const statusLabel = document.getElementById('status-label');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('status-overlay');
        const canvas = document.getElementById('canvas');

        function setStatus(text) {
            console.log("Status:", text);
            if (text.includes('Ready') || text.includes('click') || text.includes('Running')) {
                showStart();
            } else {
                statusLabel.innerText = text.toUpperCase();
            }
        }

        function showStart() {
            progressBar.style.width = '100%';
            statusLabel.style.display = 'none';
            startBtn.style.display = 'block';
        }

        function startGame() {
            overlay.style.display = 'none';
            canvas.style.display = 'block';
            window.focus();
        }

        var Module = {
            canvas: canvas,
            setStatus: setStatus,
            onRuntimeInitialized: function() {
                console.log("Runtime Initialized");
                setTimeout(showStart, 2000); // Fail-safe
            }
        };

        // Visual Progress surge
        let p = 0;
        let si = setInterval(() => {
            if (p < 90) { p += 5; progressBar.style.width = p + '%'; }
            else { clearInterval(si); }
        }, 200);

        // Ultimate Fail-safe: After 15 seconds, show the button no matter what
        setTimeout(showStart, 15000);
    </script>
    <!-- Pygbag will search for this script -->
    <script async type="text/javascript" src="battlecity.js"></script>
</body>
</html>
