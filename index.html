<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Battle City - AI Combat Evolved</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
        body {
            background-color: #0b0b10;
            background-image: linear-gradient(rgba(0, 255, 200, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 200, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            margin: 0; padding: 0; overflow: hidden; font-family: 'Outfit', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        #status-overlay {
            position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 100;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0b0b10 100%);
        }
        .main-container {
            display: flex; width: 900px; height: 520px; background: rgba(20, 20, 30, 0.95);
            border: 1px solid rgba(0, 255, 200, 0.4); box-shadow: 0 0 60px rgba(0,0,0,0.9);
            border-radius: 15px; overflow: hidden; position: relative;
        }
        .pane { flex: 1; padding: 40px; display: flex; flex-direction: column; }
        .loading-pane { flex: 1.2; justify-content: center; align-items: center; background: rgba(10, 10, 15, 0.6); border-right: 1px solid rgba(0, 255, 200, 0.1); }
        .logo { font-size: 42px; font-weight: 700; letter-spacing: 8px; color: #ffffff; text-shadow: 0 0 30px rgba(0, 255, 200, 0.5); }
        #progress-bar { width: 0%; height: 4px; background: #00ffc8; box-shadow: 0 0 15px #00ffc8; transition: width 0.3s ease; margin: 20px 0; }
        #start-btn {
            padding: 15px 40px; background: #00ffc8; border: none; color: #000; font-weight: 700; cursor: pointer; border-radius: 5px;
            display: none; text-transform: uppercase;
        }
        #start-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #canvas { display: block; width: 856px; height: 676px; background: #000; border: 2px solid #00ffc8; opacity: 0; }
        body.game-ready #canvas { opacity: 1; }
    </style>
</head>
<body>
    <div id="status-overlay">
        <div class="main-container">
            <div class="pane loading-pane">
                <div class="logo">BATTLE CITY</div>
                <div id="progress-bar"></div>
                <button id="start-btn" onclick="startGame()">Engage Combat</button>
            </div>
            <div class="pane">
                <h3 style="color:#00ffc8">Mission Briefing</h3>
                <p>WASD to Move | Space to Fire</p>
                <p style="color:#606080; font-size:12px">AI Systems Initializing...</p>
                <p id="error-text" style="color:#ff6464; font-size:12px; display:none">Failed to load game runtime. Check that main.js is present.</p>
            </div>
        </div>
    </div>
    <canvas id="canvas" width="856" height="676" oncontextmenu="event.preventDefault()"></canvas>
    <script type="text/javascript">
        const startBtn = document.getElementById('start-btn');
        const pb = document.getElementById('progress-bar');
        const overlay = document.getElementById('status-overlay');
        const errorText = document.getElementById('error-text');
        let moduleReady = false;
        function setStatus(text) {
            if (text.includes('Ready') || text.includes('Running')) {
                pb.style.width = '100%';
                startBtn.style.display = 'block';
                startBtn.disabled = false;
                moduleReady = true;
            }
        }
        function startGame() {
            if (!moduleReady) return;
            overlay.style.display = 'none';
            document.body.classList.add('game-ready');
        }
        startBtn.disabled = true;
        var Module = { canvas: document.getElementById('canvas'), setStatus: setStatus };
        let p = 0; setInterval(() => { if(p<95) { p+=5; pb.style.width=p+'%'; } }, 200);
    </script>
    <script async type="text/javascript" src="main.js" onerror="document.getElementById('error-text').style.display='block'"></script>
</body>
</html>
